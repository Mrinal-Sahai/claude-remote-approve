name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-engine:
    name: Python engine (mock suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run mock suite
        run: python3 tests/test_tg_fixes.py

  extension-unit:
    name: Extension unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  extension-integration:
    name: Extension integration tests (real VS Code)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - name: Install VS Code runtime libs + xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb libnss3 libgbm1 libasound2t64
      - name: Run integration tests under xvfb
        run: xvfb-run -a npm run test:integration
